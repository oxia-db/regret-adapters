apiVersion: apps/v1
kind: Deployment
metadata:
  name: okk-coordinator
  namespace: {{ include "okk.namespace" . }}
  labels:
    app: okk-coordinator
    {{- include "okk.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.coordinator.replicas }}
  selector:
    matchLabels:
      app: okk-coordinator
  template:
    metadata:
      labels:
        app: okk-coordinator
    spec:
      containers:
        - name: coordinator
          image: {{ .Values.coordinator.image }}
          args:
            - --listen
            - ":{{ .Values.coordinator.port }}"
          ports:
            - containerPort: {{ .Values.coordinator.port }}
              name: http
          resources:
            {{- toYaml .Values.coordinator.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.coordinator.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.coordinator.port }}
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: okk-coordinator
  namespace: {{ include "okk.namespace" . }}
  labels:
    app: okk-coordinator
    {{- include "okk.labels" . | nindent 4 }}
spec:
  selector:
    app: okk-coordinator
  ports:
    - port: {{ .Values.coordinator.port }}
      targetPort: {{ .Values.coordinator.port }}
      name: http
