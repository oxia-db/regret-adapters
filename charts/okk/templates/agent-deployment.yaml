{{- if .Values.agent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: okk-agent
  namespace: {{ include "okk.namespace" . }}
  labels:
    app: okk-agent
    {{- include "okk.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.agent.replicas }}
  selector:
    matchLabels:
      app: okk-agent
  template:
    metadata:
      labels:
        app: okk-agent
    spec:
      serviceAccountName: okk-agent
      containers:
        - name: agent
          image: {{ .Values.agent.image }}
          ports:
            - containerPort: {{ .Values.agent.port }}
              name: webhook
          envFrom:
            - secretRef:
                name: okk-agent-secrets
          env:
            {{- range $key, $value := .Values.agent.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.agent.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.agent.port }}
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: okk-agent
  namespace: {{ include "okk.namespace" . }}
  labels:
    app: okk-agent
    {{- include "okk.labels" . | nindent 4 }}
spec:
  selector:
    app: okk-agent
  ports:
    - port: {{ .Values.agent.port }}
      targetPort: {{ .Values.agent.port }}
      name: webhook
{{- end }}
