apiVersion: apps/v1
kind: Deployment
metadata:
  name: okk-jvm-worker
  namespace: {{ include "okk.namespace" . }}
  labels:
    app: okk-jvm-worker
    {{- include "okk.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: okk-jvm-worker
  template:
    metadata:
      labels:
        app: okk-jvm-worker
    spec:
      containers:
        - name: worker
          image: {{ .Values.worker.image }}
          ports:
            - containerPort: {{ .Values.worker.port }}
              name: grpc
          env:
            - name: OKK_WORKER_OXIA_SERVICE_URL
              value: {{ .Values.worker.oxiaServiceUrl | default "coordinator-okk:6648" | quote }}
            - name: OKK_WORKER_OXIA_NAMESPACE
              value: {{ .Values.worker.oxiaNamespace | default "default" | quote }}
            - name: OKK_WORKER_ENGINE_NAME
              value: "oxia"
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.worker.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: {{ .Values.worker.port }}
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: okk-jvm-worker
  namespace: {{ include "okk.namespace" . }}
  labels:
    app: okk-jvm-worker
    {{- include "okk.labels" . | nindent 4 }}
spec:
  selector:
    app: okk-jvm-worker
  ports:
    - port: {{ .Values.worker.port }}
      targetPort: {{ .Values.worker.port }}
      name: grpc
