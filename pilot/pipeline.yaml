plan:
  - every 1h: check_invariants
  - every 6h: test_scaling
  - always: inject_chaos
  - daily: post_report

chaos:
  - pod-kill
  - network-delay
  - pod-failure
  - cpu-stress
  - clock-skew

invariants:
  - zero assertion failures
  - all pods healthy
  - restarts < 10
  - p99 < 500ms
  - throughput > 0
  - shards balanced
  - leaders balanced
